services:
  app1: &app # API - Instância 01
    #    image: spring-boot-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    hostname: app1
    environment:
      - PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=30
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=30
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    expose:
      - "8080"
    mem_limit: 1024mb
    cpus: 0.425
    deploy:
      resources:
        limits:
          cpus: '0.425'
          memory: '1024MB'

  app2:
    <<: *app  # API - Instância 02
    hostname: app2

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - app1
      - app2
    ulimits:
      nproc: 1000000
      nofile:
        soft: 1000000
        hard: 1000000
    mem_limit: 100mb
    cpus: 0.15
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: '100MB'

  postgres:
    image: postgres:18.3
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
    command: [
      "postgres",
      "-c", "max_connections=100",
      "-c", "shared_buffers=256MB",
      "-c", "synchronous_commit=off"
    ]
    ports:
      - "5432:5432"
    mem_limit: 500m
    cpus: 0.50
    deploy:
      resources:
        limits:
          #          cpus: '0.35'
          cpus: '0.50'
          #          memory: '974MB'
          memory: '500MB'

