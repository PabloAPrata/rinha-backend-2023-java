spring:
  jackson:
    coercion:
      scalar:
        String: Fail
      textual:
        Integer: Fail
        Float: Fail
  application:
    name: fast-crud-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:100}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      pool-name: HikariPool
      idle-timeout: 0
      max-lifetime: 600000
      connection-timeout: 60000
  jpa:
    properties:
      hibernate:
        type:
          json_format_mapper: jackson
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  address: 0.0.0.0
  port: ${PORT:8080}
  compression:
    enabled: false
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    accept-count: 2000
    max-connections: 20000
    connection-timeout: 0
    threads:
      max: 20
logging:
  level:
    root: ERROR
    org.springframework: ERROR
    org.hibernate: ERROR
    com.zaxxer.hikari: ERROR
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: ERROR
    org.springframework.orm.jpa: ERROR
    org.springframework.transaction: ERROR